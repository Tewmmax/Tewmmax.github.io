<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Электронная копилка</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
            background: #f0f0f0;
        }
        .balance {
            font-size: 60px;
            color: green;
            font-weight: bold;
        }
        .history {
            margin-top: 30px;
            text-align: left;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .history ul {
            list-style: none;
            padding: 0;
        }
        .history li {
            padding: 5px;
            border-bottom: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🐷 Электронная копилка</h1>
    <div class="balance" id="balance">0.00 ₽</div>
    <button onclick="loadData()">🔄 Обновить</button>
    <div class="history">
        <h3>История операций</h3>
        <ul id="history-list">
            <li>Загрузка...</li>
        </ul>
    </div>
    <div id="status" style="margin-top:20px; color:gray;"></div>

    <script>
        async function loadData() {
            document.getElementById('status').innerHTML = '⏳ Загрузка...';
            try {
                const response = await fetch('balance.json?t=' + Date.now());
                if (!response.ok) throw new Error('Файл не найден');
                const data = await response.json();
                document.getElementById('balance').innerHTML = (data.balance / 100).toFixed(2) + ' ₽';
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                if (data.history && data.history.length > 0) {
                    for (let i = 0; i < data.history.length; i++) {
                        let li = document.createElement('li');
                        li.innerHTML = data.history[i];
                        list.appendChild(li);
                    }
                } else {
                    list.innerHTML = '<li>История пуста</li>';
                }
                document.getElementById('status').innerHTML = '✅ Обновлено: ' + new Date().toLocaleTimeString();
            } catch(e) {
                document.getElementById('status').innerHTML = '❌ Нет данных от копилки';
                document.getElementById('history-list').innerHTML = '<li>Нет данных</li>';
            }
        }
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
